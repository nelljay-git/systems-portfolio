<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Shop Management System</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('coffee-theme') || 'dark');</script>
</head>

<body>
  <div id="toast-container" class="toast-container"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-mug-hot"></i></div>
      <div>
        <div class="brand-text">Brew & Co.</div>
        <span class="brand-sub">Management System</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-label">Main</div>
        <a class="sidebar-link" data-page="dashboard" href="#"><span class="icon"><i class="fas fa-th-large"></i></span>
          Dashboard</a>
        <a class="sidebar-link" data-page="pos" href="#"><span class="icon"><i class="fas fa-shopping-cart"></i></span>
          Point of Sale</a>
        <a class="sidebar-link" data-page="orders" href="#"><span class="icon"><i
              class="fas fa-clipboard-list"></i></span> Orders</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Management</div>
        <a class="sidebar-link" data-page="products" href="#"><span class="icon"><i class="fas fa-mug-hot"></i></span>
          Products</a>
        <a class="sidebar-link" data-page="inventory" href="#"><span class="icon"><i class="fas fa-boxes"></i></span>
          Inventory</a>
        <a class="sidebar-link" data-page="customers" href="#"><span class="icon"><i class="fas fa-users"></i></span>
          Customers</a>
        <a class="sidebar-link" data-page="employees" href="#"><span class="icon"><i class="fas fa-user-tie"></i></span>
          Employees</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Analytics</div>
        <a class="sidebar-link" data-page="reports" href="#"><span class="icon"><i class="fas fa-chart-bar"></i></span>
          Reports</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">System</div>
        <a class="sidebar-link" data-page="settings" href="#"><span class="icon"><i class="fas fa-cog"></i></span>
          Settings</a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <a class="sidebar-link" href="#" id="logout-btn"><span class="icon"><i class="fas fa-sign-out-alt"></i></span>
        Logout</a>
    </div>
  </aside>

  <header class="navbar" id="navbar">
    <div class="navbar-left">
      <button class="sidebar-toggle"><i class="fas fa-bars"></i></button>
      <div class="navbar-search">
        <span><i class="fas fa-search"></i></span>
        <input type="text" placeholder="Search..." id="global-search">
      </div>
    </div>
    <div class="navbar-right">
      <button class="nav-btn theme-toggle-btn" title="Toggle Theme"><i class="fas fa-adjust"></i></button>
      <div class="dropdown">
        <button class="nav-btn" id="notif-btn" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="dot"></span>
        </button>
        <div class="dropdown-menu" id="notif-dropdown">
          <div class="dropdown-header">
            <span>Notifications</span>
            <span class="mark-read" onclick="App.markAllRead();event.stopPropagation()">Mark all read</span>
          </div>
          <div id="notif-list"></div>
          <div class="dropdown-footer"><a onclick="App.navigate('orders');App.closeDropdowns()">View all orders</a>
          </div>
        </div>
      </div>
      <div class="dropdown">
        <button class="nav-btn" id="profile-btn" title="Profile"><i class="fas fa-user"></i></button>
        <div class="dropdown-menu profile-dropdown" id="profile-dropdown">
          <div class="profile-info-card">
            <div class="avatar">J</div>
            <h4>John Smith</h4>
            <p>john@coffeeshop.com &middot; Admin</p>
          </div>
          <button class="profile-menu-item" onclick="App.navigate('settings');App.closeDropdowns()"><i
              class="fas fa-cog" style="width:20px"></i> Settings</button>
          <button class="profile-menu-item" onclick="App.navigate('employees');App.closeDropdowns()"><i
              class="fas fa-user-cog" style="width:20px"></i> Team Management</button>
          <button class="profile-menu-item danger" onclick="document.getElementById('logout-btn').click()"><i
              class="fas fa-sign-out-alt" style="width:20px"></i> Logout</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content" id="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <p class="page-subtitle" id="page-subtitle">Overview of your coffee shop</p>
      </div>
      <div class="btn-group" id="page-actions"></div>
    </div>
    <div id="page-content"></div>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/inventory.js"></script>
  <script src="assets/js/pos.js"></script>
  <script src="assets/js/orders.js"></script>
  <script src="assets/js/customers.js"></script>
  <script src="assets/js/employees.js"></script>
  <script src="assets/js/reports.js"></script>
  <script src="assets/js/settings.js"></script>
</body>

</html>
