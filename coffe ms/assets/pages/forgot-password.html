<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Brew & Co.</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon"><i class="fas fa-key"></i></div>
        <h1>Reset Password</h1>
        <p>Enter your email to receive reset instructions</p>
      </div>
      <form class="auth-form" id="forgot-form" onsubmit="return handleForgot(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="forgot-email" placeholder="admin@coffeeshop.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Send Reset Link</button>
      </form>
      <div class="auth-footer">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      if (!email || !email.includes('@')) {
        alert('Please enter a valid email');
        return false;
      }
      alert('Password reset link sent to ' + email + ' (demo)');
      window.location.href = 'login.html';
      return false;
    }
  </script>
</body>
</html>
