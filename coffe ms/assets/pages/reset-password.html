<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Brew & Co.</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon"><i class="fas fa-lock"></i></div>
        <h1>Set New Password</h1>
        <p>Enter your new password below</p>
      </div>
      <form class="auth-form" id="reset-form" onsubmit="return handleReset(event)">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="password-toggle">
            <input class="form-input" type="password" id="new-password" placeholder="Enter new password" required>
            <button type="button" class="toggle-btn" onclick="togglePwd('new-password')"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="password-toggle">
            <input class="form-input" type="password" id="confirm-password" placeholder="Confirm new password" required>
            <button type="button" class="toggle-btn" onclick="togglePwd('confirm-password')"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Reset Password</button>
      </form>
      <div class="auth-footer">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    function togglePwd(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function handleReset(e) {
      e.preventDefault();
      const pwd = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!pwd || pwd.length < 6) {
        alert('Password must be at least 6 characters');
        return false;
      }

      if (pwd !== confirm) {
        alert('Passwords do not match');
        return false;
      }

      alert('Password reset successfully! (demo)');
      window.location.href = 'login.html';
      return false;
    }
  </script>
</body>
</html>
